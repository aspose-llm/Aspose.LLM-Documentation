<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">
  <title>Aspose.LLM for .NET lifecycle</title>
  <desc>Flow: create preset, call AsposeLLMApi.Create (guard, binaries, model load, ready), then StartNewChatAsync / SendMessageAsync with sessions exchanging messages, then Dispose, native memory released, another instance can be created.</desc>
  <defs>
    <marker id="l-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#2c3e50"/>
    </marker>
    <style><![CDATA[
      .node rect { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.3; }
      .node text { text-anchor: middle; dominant-baseline: central; fill: #2c3e50; }
      .phase-create rect { fill: #eef4fb; }
      .phase-ready rect { fill: #e8f3ea; }
      .phase-use rect { fill: #fff3e0; }
      .phase-end rect { fill: #f5efe3; }
      .edge { fill: none; stroke: #2c3e50; stroke-width: 1.2; marker-end: url(#l-arrow); }
    ]]></style>
  </defs>

  <!-- Row 1: create + stages -->
  <g class="node phase-create"><rect x="20" y="30" width="120" height="50" rx="5" ry="5"/><text x="80" y="55">Create preset</text></g>
  <g class="node phase-create"><rect x="155" y="30" width="160" height="50" rx="5" ry="5"/><text x="235" y="55">AsposeLLMApi.Create</text></g>
  <g class="node phase-create"><rect x="330" y="30" width="130" height="50" rx="5" ry="5"/><text x="395" y="55">Stage 1: guard</text></g>
  <g class="node phase-create"><rect x="475" y="30" width="150" height="50" rx="5" ry="5"/><text x="550" y="55">Stage 2: binaries</text></g>
  <g class="node phase-create"><rect x="640" y="30" width="160" height="50" rx="5" ry="5"/><text x="720" y="55">Stage 3: model load</text></g>
  <g class="node phase-ready"><rect x="815" y="30" width="80" height="50" rx="5" ry="5"/><text x="855" y="55">Ready</text></g>

  <!-- Row 2: use + end -->
  <g class="node phase-use"><rect x="20" y="170" width="180" height="50" rx="5" ry="5"/>
    <text x="110" y="195">
      <tspan x="110" dy="-0.55em">StartNewChatAsync /</tspan>
      <tspan x="110" dy="1.1em">SendMessageAsync</tspan>
    </text></g>
  <g class="node phase-use"><rect x="215" y="170" width="200" height="50" rx="5" ry="5"/><text x="315" y="195">Sessions exchange messages</text></g>
  <g class="node phase-end"><rect x="430" y="170" width="80" height="50" rx="5" ry="5"/><text x="470" y="195">Dispose</text></g>
  <g class="node phase-end"><rect x="525" y="170" width="175" height="50" rx="5" ry="5"/><text x="612" y="195">Native memory released</text></g>
  <g class="node phase-end"><rect x="715" y="170" width="180" height="50" rx="5" ry="5"/>
    <text x="805" y="195">
      <tspan x="805" dy="-0.55em">Another AsposeLLMApi</tspan>
      <tspan x="805" dy="1.1em">can be created</tspan>
    </text></g>

  <!-- Row 1 horizontal edges -->
  <path class="edge" d="M140,55 L153,55"/>
  <path class="edge" d="M315,55 L328,55"/>
  <path class="edge" d="M460,55 L473,55"/>
  <path class="edge" d="M625,55 L638,55"/>
  <path class="edge" d="M800,55 L813,55"/>

  <!-- Wrap from F (Ready) to G -->
  <path class="edge" d="M855,80 L855,125 L110,125 L110,168"/>

  <!-- Row 2 horizontal edges -->
  <path class="edge" d="M200,195 L213,195"/>
  <path class="edge" d="M415,195 L428,195"/>
  <path class="edge" d="M510,195 L523,195"/>
  <path class="edge" d="M700,195 L713,195"/>
</svg>
