<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">
  <title>Aspose.LLM for .NET layered architecture</title>
  <desc>Consumer apps call AsposeLLMApi, which wraps Engine, which uses ModelManager, BinaryManager, and ChatSession. Both ModelManager and ChatSession feed into Aspose.LLM.Interop; BinaryManager pulls from GitHub release binaries; Interop calls into llama.cpp native libraries.</desc>
  <defs>
    <marker id="a-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 z" fill="#2c3e50"/>
    </marker>
    <style><![CDATA[
      .node rect { fill: #ffffff; stroke: #2c3e50; stroke-width: 1.3; }
      .node text { text-anchor: middle; dominant-baseline: central; fill: #2c3e50; }
      .app rect { fill: #eef4fb; }
      .native rect { fill: #f5efe3; }
      .edge { fill: none; stroke: #2c3e50; stroke-width: 1.2; marker-end: url(#a-arrow); }
    ]]></style>
  </defs>

  <!-- Row 0: App -->
  <g class="node app"><rect x="390" y="27" width="180" height="36" rx="5" ry="5"/><text x="480" y="45">Your .NET app</text></g>

  <!-- Row 1: Facade -->
  <g class="node"><rect x="370" y="97" width="220" height="36" rx="5" ry="5"/><text x="480" y="115">AsposeLLMApi facade</text></g>

  <!-- Row 2: Engine -->
  <g class="node"><rect x="425" y="167" width="110" height="36" rx="5" ry="5"/><text x="480" y="185">Engine</text></g>

  <!-- Row 3: Managers -->
  <g class="node"><rect x="115" y="247" width="170" height="36" rx="5" ry="5"/><text x="200" y="265">ModelManager</text></g>
  <g class="node"><rect x="395" y="247" width="170" height="36" rx="5" ry="5"/><text x="480" y="265">BinaryManager</text></g>
  <g class="node"><rect x="685" y="247" width="150" height="36" rx="5" ry="5"/><text x="760" y="265">ChatSession</text></g>

  <!-- Row 4: Interop + Binaries -->
  <g class="node"><rect x="250" y="337" width="220" height="36" rx="5" ry="5"/><text x="360" y="355">Aspose.LLM.Interop</text></g>
  <g class="node"><rect x="560" y="337" width="240" height="36" rx="5" ry="5"/><text x="680" y="355">GitHub release binaries</text></g>

  <!-- Row 5: Native -->
  <g class="node native"><rect x="210" y="427" width="540" height="36" rx="5" ry="5"/><text x="480" y="445">llama.cpp native: libllama, libmtmd, libggml-*</text></g>

  <!-- Edges -->
  <path class="edge" d="M480,63 L480,95"/>
  <path class="edge" d="M480,133 L480,165"/>

  <path class="edge" d="M450,203 L220,245"/>
  <path class="edge" d="M480,203 L480,245"/>
  <path class="edge" d="M510,203 L740,245"/>

  <path class="edge" d="M230,283 L320,335"/>
  <path class="edge" d="M740,283 L410,335"/>
  <path class="edge" d="M510,283 L660,335"/>

  <path class="edge" d="M370,373 L470,425"/>
</svg>
